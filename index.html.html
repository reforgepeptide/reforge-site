<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>REFORGE PEPTIDES</title>

<style>
:root{
  --black:#050507;
  --dark:#0e0f14;
  --line:#1c1f2a;
  --text:#ffffff;
  --muted:#7a7f8c;
  --accent:#00ff9d;
  --radius:14px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--black);
  color:var(--text);
}

.container{
  max-width:900px;
  margin:0 auto;
  padding:40px 20px 80px;
  text-align:center;
}

.logo{
  width:220px;
  max-width:80%;
  margin:0 auto 25px;
  display:block;
}

.brand-title{
  font-size:44px;
  letter-spacing:4px;
  font-weight:800;
  margin:0;
}

.brand-sub{
  font-size:16px;
  letter-spacing:8px;
  color:var(--muted);
  margin-top:8px;
}

.divider{
  width:100%;
  height:1px;
  background:var(--line);
  margin:40px 0;
}

.section{
  padding:20px 0;
}

.section-label{
  font-size:12px;
  letter-spacing:4px;
  color:var(--muted);
}

.section-title{
  font-size:24px;
  font-weight:700;
  margin-top:12px;
}

.button{
  display:inline-block;
  margin-top:20px;
  padding:14px 26px;
  border:2px solid var(--accent);
  border-radius:var(--radius);
  text-decoration:none;
  color:var(--accent);
  font-weight:700;
  letter-spacing:1px;
  transition:all .2s ease;
}

.button:hover{
  background:var(--accent);
  color:#000;
}

.contact-number{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
}

.footer{
  margin-top:50px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo" alt="Reforge Anchor Logo" />

<h1 class="brand-title">REFORGE</h1>
<div class="brand-sub">PEPTIDES</div>

<div class="divider"></div>

<div class="section">
  <div class="section-label">END OF MONTH SPECIAL</div>
  <div class="section-title">CONTACT FOR CURRENT DETAILS</div>
  <a class="button"
     href="https://wa.me/13102187321?text=Hi%20Reforge%2C%20what%20are%20the%20current%20end%20of%20month%20specials%3F"
     target="_blank">
     REQUEST SPECIAL
  </a>
</div>

<div class="divider"></div>

<div class="section">
  <div class="section-label">PRICE LIST</div>
  <div class="section-title">CONTACT FOR CURRENT PRICING</div>
  <a class="button"
     href="https://wa.me/13102187321?text=Hi%20Reforge%2C%20can%20you%20send%20the%20current%20price%20list%3F"
     target="_blank">
     REQUEST PRICE LIST
  </a>
</div>

<div class="divider"></div>

<div class="section">
  <div class="section-label">CONTACT</div>
  <div class="section-title">WHATSAPP ONLY</div>
  <div class="contact-number">310-218-7321</div>
  <a class="button"
     href="https://wa.me/13102187321"
     target="_blank">
     OPEN WHATSAPP
  </a>
</div>

<div class="footer">
© <span id="year"></span> REFORGE PEPTIDES
</div>

</div>

<script>
document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
